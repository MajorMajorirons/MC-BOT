<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゾーンマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; height: 100vh; background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    /* サイドバー */
    #sidebar { width: 260px; flex-shrink: 0; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
    #sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid #30363d; background: #0d1117; }
    #sidebar-header h1 { font-size: 15px; font-weight: 600; color: #58a6ff; }
    #sidebar-body { flex: 1; overflow-y: auto; padding: 10px 12px; }
    #sidebar-body::-webkit-scrollbar { width: 4px; }
    #sidebar-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
    .section-title { font-size: 10px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 1.2px; margin: 12px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #21262d; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #8b949e; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* トグルボタン */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; font-size: 11px; color: #8b949e; }
    .toggle { width: 32px; height: 16px; background: #30363d; border-radius: 8px; position: relative; cursor: pointer; transition: background 0.2s; }
    .toggle.on { background: #238636; }
    .toggle::after { content:''; position: absolute; left: 2px; top: 2px; width: 12px; height: 12px; background: #fff; border-radius: 50%; transition: left 0.2s; }
    .toggle.on::after { left: 18px; }

    /* プレイヤー */
    .player-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .player-item:hover { background: #21262d; }
    .player-avatar { width: 20px; height: 20px; border-radius: 3px; flex-shrink: 0; }
    .player-name { font-size: 12px; font-weight: 500; }
    .player-pos  { font-size: 10px; color: #8b949e; }

    /* ゾーン */
    .zone-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; border-left: 3px solid #30363d; margin-bottom: 4px; transition: background 0.15s; }
    .zone-item:hover { background: #21262d; }
    .zone-item.admin  { border-color: #f85149; }
    .zone-item.player { border-color: #3fb950; }
    .zone-item.sale   { border-color: #d29922; }
    .zone-item.unsafe { border-color: #388bfd; }
    .zone-name { font-size: 12px; font-weight: 600; }
    .zone-meta { font-size: 10px; color: #8b949e; margin-top: 2px; }

    #status { padding: 8px 16px; font-size: 10px; color: #6e7681; border-top: 1px solid #21262d; background: #0d1117; }
    #map { flex: 1; }

    /* Leaflet ポップアップ */
    .leaflet-container { background: #1c2128 !important; }
    .leaflet-popup-content-wrapper { background: #161b22 !important; border: 1px solid #30363d; color: #e6edf3 !important; border-radius: 8px !important; }
    .leaflet-popup-tip { background: #161b22 !important; }
    .leaflet-popup-content { margin: 12px 14px !important; line-height: 1.6 !important; }
    .popup-title { font-size: 14px; font-weight: 600; color: #58a6ff; margin-bottom: 6px; }
    .popup-row { font-size: 12px; display: flex; gap: 6px; }
    .popup-label { color: #8b949e; min-width: 70px; }
    .empty-msg { font-size: 11px; color: #6e7681; padding: 4px 0; }
  </style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-header">
    <h1>🗺 Zone Map</h1>
  </div>
  <div id="sidebar-body">
    <!-- 凡例 -->
    <div class="section-title">凡例</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#f8514980;border:1px solid #f85149"></div>管理者</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3fb95080;border:1px solid #3fb950"></div>保護あり</div>
      <div class="legend-item"><div class="legend-dot" style="background:#388bfd80;border:1px solid #388bfd"></div>保護なし</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d2992280;border:1px solid #d29922"></div>販売中</div>
    </div>

    <!-- レイヤー切替 -->
    <div class="section-title">レイヤー</div>
    <div class="toggle-row">地形 <div class="toggle on" id="t-terrain" onclick="toggleLayer('terrain')"></div></div>
    <div class="toggle-row">ゾーン <div class="toggle on" id="t-zones"   onclick="toggleLayer('zones')"></div></div>
    <div class="toggle-row">プレイヤー <div class="toggle on" id="t-players" onclick="toggleLayer('players')"></div></div>

    <!-- プレイヤー -->
    <div class="section-title">👥 オンライン (<span id="player-count">0</span>)</div>
    <div id="player-list"><div class="empty-msg">オフライン</div></div>

    <!-- ゾーン -->
    <div class="section-title">🏠 ゾーン (<span id="zone-count">0</span>)</div>
    <div id="zone-list"><div class="empty-msg">ゾーンなし</div></div>
  </div>
  <div id="status">読み込み中...</div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 座標変換 ───────────────────────────────────────────────
// Leaflet CRS.Simple: lat = -Z, lng = X
function mc2ll(x, z)  { return [-z, x]; }
function zoneBounds(z) { return [mc2ll(z.x1, z.z1), mc2ll(z.x2, z.z2)]; }

// ── Leaflet 初期化 ─────────────────────────────────────────
const map = L.map('map', {
  crs: L.CRS.Simple, minZoom: -6, maxZoom: 5, zoomControl: true
});
map.setView([0, 0], -3);

// カスタムペイン（地形レイヤーを最下層に）
map.createPane('terrain');  map.getPane('terrain').style.zIndex  = 200;
map.createPane('zones');    map.getPane('zones').style.zIndex    = 400;
map.createPane('players');  map.getPane('players').style.zIndex  = 600;

// ── グリッド ───────────────────────────────────────────────
const GRID_RANGE = 10000;
for (let x = -GRID_RANGE; x <= GRID_RANGE; x += 512) {
  L.polyline([[-GRID_RANGE, x],[GRID_RANGE, x]],  { color:'#30363d', weight:0.5, interactive:false }).addTo(map);
}
for (let z = -GRID_RANGE; z <= GRID_RANGE; z += 512) {
  L.polyline([[-z,-GRID_RANGE],[-z,GRID_RANGE]], { color:'#30363d', weight:0.5, interactive:false }).addTo(map);
}
L.polyline([[0,-GRID_RANGE],[0,GRID_RANGE]],  { color:'#388bfd40', weight:1, interactive:false }).addTo(map);
L.polyline([[-GRID_RANGE,0],[GRID_RANGE,0]],  { color:'#388bfd40', weight:1, interactive:false }).addTo(map);

// ── 地形カスタムレイヤー ───────────────────────────────────
const TerrainLayer = L.Layer.extend({
  onAdd(map) {
    this._map = map;
    this._canvas = document.createElement('canvas');
    this._canvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
    map.getPane('terrain').appendChild(this._canvas);
    this._reset();
    map.on('viewreset moveend zoomend', this._reset, this);
  },
  onRemove(map) {
    this._canvas.remove();
    map.off('viewreset moveend zoomend', this._reset, this);
  },
  update(terrainData, world) {
    this._data  = terrainData[world] || {};
    this._world = world;
    this._draw();
  },
  _reset() {
    const size = this._map.getSize();
    this._canvas.width  = size.x;
    this._canvas.height = size.y;
    const tl = this._map.containerPointToLayerPoint([0, 0]);
    L.DomUtil.setPosition(this._canvas, tl);
    this._draw();
  },
  _draw() {
    if (!this._data) return;
    const ctx    = this._canvas.getContext('2d');
    ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);

    for (const [key, colors] of Object.entries(this._data)) {
      const [cx, cz] = key.split(',').map(Number);
      // チャンク四隅（4サンプル×4列）
      for (let i = 0; i < 16; i++) {
        const sx = (i % 4) * 4;   // local x in chunk (0,4,8,12)
        const sz = Math.floor(i / 4) * 4; // local z in chunk
        const wx1 = cx * 16 + sx,  wz1 = cz * 16 + sz;
        const wx2 = wx1 + 4,        wz2 = wz1 + 4;

        const p1 = this._map.latLngToContainerPoint(mc2ll(wx1, wz1));
        const p2 = this._map.latLngToContainerPoint(mc2ll(wx2, wz2));
        const pw = Math.abs(p2.x - p1.x);
        const ph = Math.abs(p2.y - p1.y);
        if (pw < 0.5 || ph < 0.5) continue;

        const rgb = colors[i] || 0x808080;
        const r = (rgb >> 16) & 0xFF;
        const g = (rgb >>  8) & 0xFF;
        const b =  rgb        & 0xFF;
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(Math.min(p1.x, p2.x), Math.min(p1.y, p2.y), pw, ph);
      }
    }
  }
});

const terrainLayer = new TerrainLayer();
terrainLayer.addTo(map);

// ── ゾーンレイヤー ─────────────────────────────────────────
const zoneLayers = {};

function zoneStyle(z) {
  if (!z.owner_uuid) return { color:'#f85149', fillColor:'#f8514920', weight:2, fillOpacity:1, pane:'zones' };
  if (z.sell_price > 0) return { color:'#d29922', fillColor:'#d2992220', weight:2, fillOpacity:1, pane:'zones' };
  if (z.explosion_protected) return { color:'#3fb950', fillColor:'#3fb95020', weight:2, fillOpacity:1, pane:'zones' };
  return { color:'#388bfd', fillColor:'#388bfd18', weight:2, fillOpacity:1, pane:'zones' };
}

function popupHtml(z) {
  const owner = z.owner_uuid ? z.owner_name : '<span style="color:#f85149">管理者ゾーン</span>';
  const sale  = z.sell_price > 0 ? `<span style="color:#d29922">💰 ${Number(z.sell_price).toLocaleString()}</span>` : '<span style="color:#6e7681">非売品</span>';
  return `<div class="popup-title">🏠 ${z.name}</div>
    <div class="popup-row"><span class="popup-label">所有者</span><span>${owner}</span></div>
    <div class="popup-row"><span class="popup-label">爆発保護</span><span>${z.explosion_protected ? '✅ 有効' : '❌ 無効'}</span></div>
    <div class="popup-row"><span class="popup-label">販売</span><span>${sale}</span></div>
    <div class="popup-row"><span class="popup-label">ワールド</span><span>${z.world || 'world'}</span></div>
    <div class="popup-row"><span class="popup-label">座標1</span><span>(${z.x1}, ${z.y1}, ${z.z1})</span></div>
    <div class="popup-row"><span class="popup-label">座標2</span><span>(${z.x2}, ${z.y2}, ${z.z2})</span></div>`;
}

function renderZones(zones) {
  const entries = Object.values(zones);
  document.getElementById('zone-count').textContent = entries.length;

  const names = new Set(entries.map(z => z.name));
  for (const [n, l] of Object.entries(zoneLayers)) {
    if (!names.has(n)) { l.remove(); delete zoneLayers[n]; }
  }

  const list = document.getElementById('zone-list');
  list.innerHTML = entries.length ? '' : '<div class="empty-msg">ゾーンなし</div>';

  for (const z of entries) {
    if (!zoneLayers[z.name]) {
      const rect = L.rectangle(zoneBounds(z), zoneStyle(z)).addTo(map);
      rect.bindPopup(popupHtml(z), { maxWidth: 260 });
      zoneLayers[z.name] = rect;
    } else {
      zoneLayers[z.name].setStyle(zoneStyle(z));
      zoneLayers[z.name].bindPopup(popupHtml(z));
    }

    const isAdmin = !z.owner_uuid;
    const cls = isAdmin ? 'admin' : (z.sell_price > 0 ? 'sale' : (z.explosion_protected ? 'player' : 'unsafe'));
    const div = document.createElement('div');
    div.className = `zone-item ${cls}`;
    div.innerHTML = `<div class="zone-name">${z.name}${z.sell_price > 0 ? ' <span style="color:#d29922">💰</span>' : ''}</div>
      <div class="zone-meta">${isAdmin ? '[管理者]' : z.owner_name}${z.explosion_protected ? ' 🛡' : ''}</div>`;
    div.onclick = () => {
      map.fitBounds(zoneBounds(z), { padding:[40,40], maxZoom:2 });
      setTimeout(() => zoneLayers[z.name]?.openPopup(), 300);
    };
    list.appendChild(div);
  }
}

// ── プレイヤーレイヤー ─────────────────────────────────────
const playerLayers = {};

function makePlayerIcon(name) {
  return L.divIcon({
    html: `<div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center">
      <img src="https://minotar.net/helm/${encodeURIComponent(name)}/28"
           style="width:28px;height:28px;border:2px solid #58a6ff;border-radius:4px;background:#161b22;image-rendering:pixelated"
           onerror="this.src='https://minotar.net/helm/MHF_Steve/28'">
    </div>`,
    className: '', iconSize:[32,32], iconAnchor:[16,16], pane:'players'
  });
}

function renderPlayers(players) {
  const entries = Object.entries(players);
  document.getElementById('player-count').textContent = entries.length;

  const names = new Set(entries.map(([n]) => n));
  for (const [n, m] of Object.entries(playerLayers)) {
    if (!names.has(n)) { m.remove(); delete playerLayers[n]; }
  }

  const list = document.getElementById('player-list');
  list.innerHTML = entries.length ? '' : '<div class="empty-msg">オフライン</div>';

  for (const [name, p] of entries) {
    const ll = mc2ll(p.x, p.z);
    if (playerLayers[name]) {
      playerLayers[name].setLatLng(ll);
    } else {
      playerLayers[name] = L.marker(ll, { icon: makePlayerIcon(name), pane:'players' })
        .bindTooltip(name, { direction:'top', offset:[0,-18], permanent:false })
        .addTo(map);
    }

    const div = document.createElement('div');
    div.className = 'player-item';
    div.innerHTML = `<img class="player-avatar"
        src="https://minotar.net/helm/${encodeURIComponent(name)}/20"
        onerror="this.style.display='none'" style="image-rendering:pixelated">
      <div><div class="player-name">${name}</div>
      <div class="player-pos">X:${Math.round(p.x)} Y:${Math.round(p.y)} Z:${Math.round(p.z)}</div></div>`;
    div.onclick = () => map.setView(mc2ll(p.x, p.z), 1);
    list.appendChild(div);
  }
}

// ── レイヤー表示切替 ───────────────────────────────────────
const layerState = { terrain: true, zones: true, players: true };
function toggleLayer(name) {
  layerState[name] = !layerState[name];
  document.getElementById('t-' + name).classList.toggle('on', layerState[name]);

  if (name === 'terrain') {
    map.getPane('terrain').style.display  = layerState.terrain  ? '' : 'none';
  }
  if (name === 'zones') {
    map.getPane('zones').style.display    = layerState.zones    ? '' : 'none';
  }
  if (name === 'players') {
    map.getPane('players').style.display  = layerState.players  ? '' : 'none';
  }
}

// ── データ取得・更新 ───────────────────────────────────────
async function refresh() {
  try {
    const [zones, players] = await Promise.all([
      fetch('/public/zones').then(r => r.json()),
      fetch('/public/players').then(r => r.json()),
    ]);
    renderZones(zones);
    renderPlayers(players);
    document.getElementById('status').textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
  } catch (e) {
    document.getElementById('status').textContent = 'エラー: ' + e.message;
  }
}

async function refreshTerrain() {
  try {
    const data = await fetch('/public/terrain').then(r => r.json());
    terrainLayer.update(data, 'world');
  } catch { /* ignore */ }
}

refresh();
refreshTerrain();
setInterval(refresh, 5000);
setInterval(refreshTerrain, 60000);
</script>
</body>
</html>
